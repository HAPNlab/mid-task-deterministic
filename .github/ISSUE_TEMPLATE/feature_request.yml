name: Feature request
description: Suggest new functionality, tooling, or a change to task behavior.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. For changes that affect task design (cues, timing,
        difficulty levels, sequences), please note the experimental rationale so we can
        evaluate the impact on data collected with the current version.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve, or what would it enable?
      placeholder: It is currently not possible to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you prefer the proposal.
  - type: dropdown
    id: impact
    attributes:
      label: Does this change task behavior or timing?
      description: Changes to stimuli, timing, or sequences can affect comparability of data across versions.
      options:
        - "No — tooling/docs/internal only"
        - "Yes — affects stimuli, timing, or experiment design"
        - "Not sure"
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
