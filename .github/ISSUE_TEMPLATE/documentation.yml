name: Documentation
description: Report a problem with, or suggest an improvement to, the documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the docs. This covers the
        [README](../../README.md), [usage guide](../../docs/usage.md),
        [development guide](../../docs/development.md), and [AGENTS.md](../../AGENTS.md).
  - type: dropdown
    id: location
    attributes:
      label: Which document?
      options:
        - README
        - Usage Guide (docs/usage.md)
        - Development Guide (docs/development.md)
        - AGENTS.md
        - CONTRIBUTING.md
        - Other (describe below)
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
      description: Describe the inaccuracy, gap, or confusion. Link to the section if you can.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: What should it say instead? A proposed wording is welcome.
