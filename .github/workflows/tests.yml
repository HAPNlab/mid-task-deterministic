name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Octave is the reference engine for the calibration MATLAB-parity test
      # (tests/test_calibration_matlab_parity.py). Without it that test skips
      # with a loud warning, so installing it here is what makes the parity
      # check actually run in CI.
      - name: Install Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends octave
          octave --version | head -1

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # PsychoPy is deliberately NOT installed: it's a heavy GUI/audio dep whose
      # transitive build (ffpyplayer → SDL headers) is fragile on headless CI,
      # and it's only needed by the display-bound tests excluded below. The
      # display-free modules under test import nothing beyond the stdlib except
      # pandas (sequences.py), so we install just that + pytest and put `src` on
      # PYTHONPATH rather than resolving the project's full dependency graph.
      - name: Create venv and install minimal test deps
        run: |
          uv venv
          uv pip install pytest pandas

      # Tests that transitively import PsychoPy are excluded here (run them
      # locally with a full `uv sync`): test_overlay, test_reward,
      # test_trial_boundary, test_recorder. Octave (installed above) lets the
      # MATLAB-parity test actually run rather than skip.
      - name: Run display-free tests
        env:
          PYTHONPATH: src
        run: |
          .venv/bin/python -m pytest -v \
            tests/test_calibration.py \
            tests/test_calibration_matlab_parity.py \
            tests/test_config.py \
            tests/test_scanner.py \
            tests/test_sequences.py \
            tests/test_ratings.py
